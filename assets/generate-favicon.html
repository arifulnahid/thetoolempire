<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Generate Favicon</title>
<style>body{background:#111;color:#fff;font-family:system-ui;padding:24px;text-align:center;} .btn{display:inline-block;padding:12px 28px;background:#6c63ff;color:#fff;border-radius:8px;cursor:pointer;font-size:1rem;font-weight:700;margin:8px;text-decoration:none;}</style>
</head>
<body>
<h2>Favicon Generator</h2>
<p>Downloads <code>favicon-32.png</code> — rename to upload alongside your favicon.ico</p>
<canvas id="c32" width="32" height="32" style="image-rendering:pixelated;width:64px;height:64px;border:1px solid #333;margin:8px"></canvas>
<canvas id="c180" width="180" height="180" style="width:90px;height:90px;border:1px solid #333;margin:8px"></canvas>
<br>
<a class="btn" id="dl32">⬇ favicon-32.png</a>
<a class="btn" id="dl180">⬇ apple-touch-icon.png (180×180)</a>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const S = canvas.width;
  const r = S * 0.22;
  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, S, S);
  bg.addColorStop(0, '#6c63ff');
  bg.addColorStop(1, '#4ecdc4');
  ctx.beginPath();
  ctx.roundRect(0, 0, S, S, r);
  ctx.fillStyle = bg;
  ctx.fill();
  // Cross / tool icon
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = S * 0.12;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(S*0.3, S*0.5); ctx.lineTo(S*0.7, S*0.5);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(S*0.5, S*0.3); ctx.lineTo(S*0.5, S*0.7);
  ctx.stroke();
  // Center circle
  ctx.beginPath();
  ctx.arc(S*0.5, S*0.5, S*0.14, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.8)';
  ctx.lineWidth = S * 0.08;
  ctx.stroke();
}
[document.getElementById('c32'), document.getElementById('c180')].forEach(drawIcon);

document.getElementById('dl32').href = document.getElementById('c32').toDataURL('image/png');
document.getElementById('dl32').download = 'favicon-32.png';
document.getElementById('dl180').href = document.getElementById('c180').toDataURL('image/png');
document.getElementById('dl180').download = 'apple-touch-icon.png';
</script>
</body>
</html>
